language: en-US
tone_instructions: ""
early_access: false
enable_free_tier: true
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: false
  sequence_diagrams: false
  estimate_code_review_effort: false
  auto_assign_reviewers: true
  poem: false
  pre_merge_checks:
      custom_checks:
        - name: "Changeset Required"
          mode: error
          instructions: |
            Check if this pull request includes at least one changeset file.

            A changeset file is any file matching the pattern `.changeset/*.md` (excluding `.changeset/README.md`). It should contain all the changed packages in the pull request along with the version update type.

            For the updates to "features", "modules" directories, make sure to also include the apps/console app (@wso2is/console), apps/myaccount app (@wso2is/myaccount) or identity-apps-core module (@wso2is/identity-apps-core) in 
            the changeset with a patch version update accordingly. If there are new packages in the pull request, they should be mentioned as a major version update in the changeset.
            
            **Pass Criteria:**
            - At least one new or modified `.md` file exists in the `.changeset/` directory
            - The file should NOT be `.changeset/README.md`

            **Fail Criteria:**
            - No changeset files are added or modified
            - Only `.changeset/README.md` is modified

            To verify this, use shell commands to:
            1. Check if any `.md` files in `.changeset/` directory are in the PR diff
            2. Exclude `.changeset/README.md` from consideration

            If no changeset is found, the check should fail with a clear explanation that changesets are required for tracking changes.
knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns: ["docs/write-code/CODE_QUALITY.md"]
